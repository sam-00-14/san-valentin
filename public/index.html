<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>💖 Sorpresa 💖</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <h1>💌 Para alguien especial 💌</h1>

        <button id="btnSorpresa">Abrir sorpresa 🎁</button>

        <div id="sorpresa" class="hidden">
            <img src="foto.jpg" class="foto">
            <p class="texto">Gracias por estar en mi vida 💖</p>
        </div>

        <audio id="musica" src="https://www.youtube.com/watch?v=R2KeQqLzr00&list=RDGMEMYH9CUrFO7CfLJpaD7UR85w&start_radio=1" loop></audio>

        <h3>Déjame un mensaje 💬</h3>
        <input id="nombre" placeholder="Tu nombre">
        <textarea id="mensaje" placeholder="Escribe algo bonito"></textarea>
        <button onclick="enviarMensaje()">Enviar 💘</button>

        <div id="listaMensajes"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
